<!doctype html>
<html>
<head>
    <title>Guess Game</title>
    <link href="public/css/guesss-game.css" rel="stylesheet"/>
</head>
<body>
<div class="main-container">
    <h2>Guess Game</h2>

    <div style="margin-bottom: 10px">
        Guess a number between 1 - 20, you have 5 chances.
    </div>

    <div class="input">
        <input id="guess-value" name="guess-value" type="text"/>
        <button id="guess-btn">Guess!</button>
        <button id="restart-btn">Restart</button>
    </div>

    <hr/>

    <div id="attempt-text" style="margin-bottom: 10px">
        Attempt <span id="attempt"></span>/5
    </div>

    <div id="result"></div>
</div>

<!--it is important that the script tag is placed at the bottom of the body, so the HTML elements already exist by the time JavaScript runs. Thus no goofy JS errors. If i were to put it inside head, i need to use `defer` in the script tag-->
<script src="public/js/guess-game.js"></script>
</body>
</html>
